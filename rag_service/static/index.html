<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG - Truy vấn tài liệu pháp luật</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a3e;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #6b6b8d;
            --border: #2a2a4a;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .logo {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: #fff;
        }
        .header h1 {
            font-size: 18px; font-weight: 600;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success); margin-left: auto;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }
        .header .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Main layout */
        .main {
            display: flex; flex: 1; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 340px; min-width: 340px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow-y: auto;
        }

        .section-title {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 16px 20px 8px;
        }

        /* Upload area */
        .upload-zone {
            margin: 8px 16px 16px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.05);
        }
        .upload-zone input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
        .upload-zone p { font-size: 13px; color: var(--text-secondary); }
        .upload-zone .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* Upload status */
        .upload-status {
            margin: 0 16px 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .upload-status.show { display: flex; }
        .upload-status.processing {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: var(--warning);
        }
        .upload-status.success {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: var(--success);
        }
        .upload-status.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--danger);
        }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* File list */
        .file-list {
            flex: 1; overflow-y: auto;
            padding: 0 16px 16px;
        }
        .file-item {
            display: flex; align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            gap: 10px;
        }
        .file-item:hover { background: rgba(108, 99, 255, 0.08); }
        .file-item.selected {
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.3);
        }
        .file-item .checkbox {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .file-item.selected .checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }
        .file-item.selected .checkbox::after {
            content: '✓'; font-size: 11px; color: #fff; font-weight: 700;
        }
        .file-item .file-icon { font-size: 16px; flex-shrink: 0; }
        .file-item .file-info { flex: 1; min-width: 0; }
        .file-item .file-name {
            font-weight: 500; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .file-item .file-meta {
            font-size: 11px; color: var(--text-muted); margin-top: 2px;
        }
        .file-item .delete-btn {
            width: 28px; height: 28px;
            border: none; background: transparent;
            color: var(--text-muted); cursor: pointer;
            border-radius: 6px; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.2s; flex-shrink: 0;
        }
        .file-item:hover .delete-btn { opacity: 1; }
        .file-item .delete-btn:hover {
            background: rgba(248, 113, 113, 0.15); color: var(--danger);
        }

        .empty-state {
            padding: 32px 16px; text-align: center;
            color: var(--text-muted); font-size: 13px;
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

        /* Actions bar */
        .sidebar-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex; gap: 8px;
        }
        .sidebar-actions button {
            flex: 1; padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .sidebar-actions button:hover {
            border-color: var(--accent); color: var(--accent);
        }
        .sidebar-actions button.danger:hover {
            border-color: var(--danger); color: var(--danger);
        }

        /* Chat area */
        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-primary);
        }

        .messages {
            flex: 1; overflow-y: auto;
            padding: 24px 32px;
            display: flex; flex-direction: column;
            gap: 16px;
        }

        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; gap: 16px;
        }
        .welcome .icon { font-size: 64px; opacity: 0.3; }
        .welcome h2 {
            font-size: 20px; font-weight: 600;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .welcome p { font-size: 14px; color: var(--text-muted); max-width: 400px; }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #5a52e0);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.assistant .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }
        .message.thinking {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex; gap: 6px; padding: 16px 24px;
        }
        .message.thinking span {
            width: 8px; height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .message.thinking span:nth-child(2) { animation-delay: 0.2s; }
        .message.thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input area */
        .input-area {
            padding: 16px 32px 24px;
            border-top: 1px solid var(--border);
        }
        .input-wrapper {
            display: flex;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 18px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 120px;
        }
        .input-wrapper textarea::placeholder { color: var(--text-muted); }
        .input-wrapper button {
            width: 48px;
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .input-wrapper button:hover { background: rgba(108, 99, 255, 0.1); }
        .input-wrapper button:disabled { opacity: 0.3; cursor: not-allowed; }

        .selected-files-hint {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }
        .selected-files-hint strong { color: var(--accent); font-weight: 500; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Responsive */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; min-width: auto; max-height: 45vh; }
            .messages { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">R</div>
    <h1>RAG Legal Assistant</h1>
    <div class="status-dot" id="statusDot" title="Đang kết nối..."></div>
</div>

<div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="section-title">📤 Upload tài liệu</div>
        <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept=".pdf">
            <div class="icon">📁</div>
            <p>Kéo thả hoặc click để chọn file</p>
            <div class="hint">Hỗ trợ: PDF</div>
        </div>

        <div class="upload-status" id="uploadStatus">
            <div class="spinner"></div>
            <span id="uploadStatusText"></span>
        </div>

        <div class="section-title">📂 Tài liệu trong database</div>
        <div class="file-list" id="fileList">
            <div class="empty-state" id="emptyState">
                <div class="icon">📭</div>
                <p>Chưa có tài liệu nào.<br>Hãy upload file để bắt đầu.</p>
            </div>
        </div>

        <div class="sidebar-actions">
            <button onclick="selectAllFiles()">Chọn tất cả</button>
            <button onclick="deselectAllFiles()">Bỏ chọn</button>
            <button class="danger" onclick="clearAll()">Xoá tất cả</button>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="icon">⚖️</div>
                <h2>Hỏi đáp tài liệu pháp luật</h2>
                <p>Upload tài liệu PDF, chọn file muốn tra cứu, rồi đặt câu hỏi.</p>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="questionInput" placeholder="Nhập câu hỏi tại đây..." rows="1"></textarea>
                <button id="sendBtn" onclick="sendQuestion()" title="Gửi">➤</button>
            </div>
            <div class="selected-files-hint" id="selectedHint"></div>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
let selectedFiles = new Set();
let allFiles = [];

// ─── Init ───
document.addEventListener('DOMContentLoaded', () => {
    checkHealth();
    loadFiles();
    setupUpload();
    setupTextarea();
    setInterval(checkHealth, 15000);
});

// ─── Health ───
async function checkHealth() {
    const dot = document.getElementById('statusDot');
    try {
        const r = await fetch(`${API_BASE}/api/health`);
        const d = await r.json();
        dot.classList.toggle('offline', d.status !== 'ok');
        dot.title = d.status === 'ok'
            ? `Online — ${d.documents_loaded} chunks`
            : 'Offline';
    } catch {
        dot.classList.add('offline');
        dot.title = 'Không thể kết nối server';
    }
}

// ─── Upload ───
function setupUpload() {
    const zone = document.getElementById('uploadZone');
    const input = document.getElementById('fileInput');

    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    });
    input.addEventListener('change', () => {
        if (input.files.length) uploadFiles(input.files);
        input.value = '';
    });
}

async function uploadFiles(fileList) {
    const status = document.getElementById('uploadStatus');
    const text = document.getElementById('uploadStatusText');

    status.className = 'upload-status show processing';
    text.textContent = `Đang xử lý ${fileList.length} file...`;

    const formData = new FormData();
    for (const f of fileList) formData.append('files', f);

    try {
        const r = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
        const d = await r.json();
        if (r.ok) {
            status.className = 'upload-status show success';
            text.textContent = `✓ ${d.message}`;
            loadFiles();
        } else {
            status.className = 'upload-status show error';
            text.textContent = `✗ ${d.detail || 'Lỗi upload'}`;
        }
    } catch (err) {
        status.className = 'upload-status show error';
        text.textContent = `✗ Lỗi kết nối: ${err.message}`;
    }
    setTimeout(() => { status.className = 'upload-status'; }, 6000);
}

// ─── Files ───
async function loadFiles() {
    try {
        const r = await fetch(`${API_BASE}/api/files`);
        const d = await r.json();
        allFiles = d.files || [];
        renderFiles();
    } catch {
        allFiles = [];
        renderFiles();
    }
}

function renderFiles() {
    const list = document.getElementById('fileList');
    const empty = document.getElementById('emptyState');

    if (allFiles.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        empty.style.display = 'block';
        updateSelectedHint();
        return;
    }

    empty.style.display = 'none';
    list.innerHTML = allFiles.map(f => `
        <div class="file-item ${selectedFiles.has(f.name) ? 'selected' : ''}"
             onclick="toggleFile('${f.name}')" data-file="${f.name}">
            <div class="checkbox"></div>
            <div class="file-icon">📄</div>
            <div class="file-info">
                <div class="file-name" title="${f.name}">${f.name}</div>
                <div class="file-meta">${f.chunk_count} chunks</div>
            </div>
            <button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${f.name}')" title="Xoá">🗑</button>
        </div>
    `).join('');
    updateSelectedHint();
}

function toggleFile(name) {
    if (selectedFiles.has(name)) selectedFiles.delete(name);
    else selectedFiles.add(name);
    renderFiles();
}

function selectAllFiles() {
    allFiles.forEach(f => selectedFiles.add(f.name));
    renderFiles();
}

function deselectAllFiles() {
    selectedFiles.clear();
    renderFiles();
}

function updateSelectedHint() {
    const hint = document.getElementById('selectedHint');
    if (selectedFiles.size === 0 && allFiles.length > 0) {
        hint.innerHTML = '💡 Chọn file ở sidebar để giới hạn phạm vi tìm kiếm (hoặc tìm <strong>tất cả</strong>)';
    } else if (selectedFiles.size > 0) {
        hint.innerHTML = `🔍 Đang tìm kiếm trong <strong>${selectedFiles.size}</strong> file được chọn`;
    } else {
        hint.innerHTML = '';
    }
}

async function deleteFile(name) {
    if (!confirm(`Xoá file "${name}" khỏi database?`)) return;
    try {
        const r = await fetch(`${API_BASE}/api/files/${encodeURIComponent(name)}`, { method: 'DELETE' });
        if (r.ok) {
            selectedFiles.delete(name);
            loadFiles();
        }
    } catch {}
}

async function clearAll() {
    if (!confirm('Xoá toàn bộ dữ liệu? Không thể hoàn tác.')) return;
    try {
        await fetch(`${API_BASE}/api/clear`, { method: 'DELETE' });
        selectedFiles.clear();
        loadFiles();
        document.getElementById('messages').innerHTML = `
            <div class="welcome" id="welcome">
                <div class="icon">⚖️</div>
                <h2>Hỏi đáp tài liệu pháp luật</h2>
                <p>Upload tài liệu PDF, chọn file muốn tra cứu, rồi đặt câu hỏi.</p>
            </div>`;
    } catch {}
}

// ─── Chat ───
function setupTextarea() {
    const ta = document.getElementById('questionInput');
    ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    });
    ta.addEventListener('input', () => {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
}

async function sendQuestion() {
    const ta = document.getElementById('questionInput');
    const q = ta.value.trim();
    if (!q) return;

    // Remove welcome
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    // Add user message
    const msgs = document.getElementById('messages');
    addMessage(q, 'user');
    ta.value = '';
    ta.style.height = 'auto';

    // Thinking indicator
    const thinking = document.createElement('div');
    thinking.className = 'message thinking';
    thinking.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(thinking);
    msgs.scrollTop = msgs.scrollHeight;

    // Disable input
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    ta.disabled = true;

    try {
        const body = { question: q };
        if (selectedFiles.size > 0) {
            body.source_filter = Array.from(selectedFiles);
        }
        const r = await fetch(`${API_BASE}/api/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const d = await r.json();
        thinking.remove();
        if (r.ok) {
            addMessage(d.answer, 'assistant');
        } else {
            addMessage(`⚠️ ${d.detail || 'Lỗi xử lý câu hỏi'}`, 'assistant');
        }
    } catch (err) {
        thinking.remove();
        addMessage(`⚠️ Lỗi kết nối: ${err.message}`, 'assistant');
    }

    btn.disabled = false;
    ta.disabled = false;
    ta.focus();
}

function addMessage(text, role) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
